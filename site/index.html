<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mijn publieke agenda voor District Antwerpen met activiteiten, sportmomenten en openbare werken."
    />
    <link rel="canonical" href="https://mijn-publieke-agenda-voor-district.onrender.com/" />
    <script>
      {
        const canonicalHost = "mijn-publieke-agenda-voor-district.onrender.com";
        const oldHosts = new Set([
          "publieke-agenda-antwerpen.onrender.com",
          "mijn-agenda-district-antwerpen.onrender.com",
        ]);
        if (oldHosts.has(window.location.hostname)) {
          window.location.replace(`https://${canonicalHost}${window.location.pathname}${window.location.search}${window.location.hash}`);
        }
      }
    </script>
    <title>Mijn publieke agenda voor District Antwerpen</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="agenda-page">
      <header class="agenda-header">
        <div>
          <h1>Mijn publieke agenda voor District Antwerpen</h1>
          <p>
            Activiteiten, sportmomenten en werken overzichtelijk per datum en uur. Klik op een onderwerp voor details en
            de publieke bron.
          </p>
        </div>
        <aside class="agenda-count" aria-label="Aantal agenda-items">
          <span id="agenda-count-value">0</span>
          <strong>actuele punten</strong>
          <small id="agenda-count-detail"></small>
        </aside>
      </header>

      <section class="agenda-controls" aria-label="Agenda filteren">
        <div class="agenda-controls-title">Thema's</div>
        <div id="theme-controls" class="theme-controls"></div>
      </section>

      <section id="agenda-list" class="agenda-list" aria-label="Kalender per datum"></section>
    </main>

    <script src="./agenda.js"></script>
  </body>
</html>
